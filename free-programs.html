<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markzira | Free Software</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav id="global-nav"></nav>

    <div class="container page-layout">
        <main class="main-content" style="flex: 1 1 100%; text-align: center;">
            <h1 style="font-size: 3rem; color: #fff; margin-bottom: 20px;">Free <span style="color: #10b981;">Software</span></h1>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 40px;">Download our collection of free marketing and data extraction utilities.</p>

            <div class="grid" style="text-align: left;">
                <!-- Example Free Software Card -->
                <div class="card">
                    <i class="fas fa-file-excel" style="font-size: 3.5rem; color: #10b981; margin-bottom: 15px;"></i>
                    <h3 style="color: #fff; margin-bottom: 10px; font-size: 1.5rem;">Data Cleaner Lite</h3>
                    <span style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold;">Free Version</span>
                    <p style="color: #cbd5e1; margin: 20px 0; font-size: 0.95rem;">Quickly clean and format your Excel and CSV files before importing them to your CRM.</p>
                    <a href="#" class="btn-download" style="background: linear-gradient(90deg, #10b981, #059669);">
                        <i class="fas fa-download"></i> Download Now
                    </a>
                </div>
            </div>
        </main>
    </div>

    <footer id="global-footer" style="background-color: #020617; border-top: 1px solid #1e293b;"></footer>
    <script src="shared-layout.js"></script>
</body>
</html>
