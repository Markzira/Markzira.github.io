<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Titan Marketing Suite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-meteor logo-icon"></i>
                <span class="logo-text">Titan</span>
                <span class="logo-sub">Marketing</span>
            </a>
            <ul>
                <li><a href="index.html">العودة للرئيسية</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>تسجيل الدخول</h2>
            <p style="color: #94a3b8; margin-bottom: 25px;">مرحباً بك في لوحة تحكم تيتان</p>
            
            <form action="#">
                <div class="input-group">
                    <label>البريد الإلكتروني أو رقم الهاتف</label>
                    <input type="text" placeholder="أدخل بريدك أو رقمك" required>
                </div>
                
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <button type="submit" class="btn-full">دخول إلى حسابي</button>
            </form>

            <div class="auth-links">
                <p style="color: #cbd5e1; margin-bottom: 10px;">ليس لديك حساب؟ <a href="#">اشترك مجاناً الآن</a></p>
                <a href="#" style="color: #94a3b8; font-size: 0.85rem;">هل نسيت كلمة المرور؟</a>
            </div>
        </div>
    </div>

</body>
</html>
