<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع البرامج | لوحة الإدارة</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="downloads.html">مركز التحميل</a></li>
            </ul>
            <a href="index.html" class="logo-center">
                <i class="fas fa-cogs logo-icon"></i>
                <span class="logo-text">إدارة</span><span class="logo-sub">النظام</span>
            </a>
            <div class="nav-actions">
                <a href="#" class="login-btn-nav" style="border-color:#ef4444; color:#ef4444;">تسجيل الخروج</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 130px; max-width: 800px;">
        <div class="card" style="text-align: right;">
            <h2 style="color: #f59e0b; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px;">
                <i class="fas fa-cloud-upload-alt"></i> رفع بيانات وإصدارات البرامج
            </h2>
            <form onsubmit="event.preventDefault(); alert('تم رفع البرنامج بنجاح إلى مركز التحميل!');">
                <div class="input-group">
                    <label>اسم البرنامج</label>
                    <input type="text" placeholder="مثال: Titan WhatsApp Pro" required>
                </div>
                
                <div style="display: flex; gap: 20px;">
                    <div class="input-group" style="flex: 1;">
                        <label>رقم الإصدار</label>
                        <input type="text" placeholder="مثال: v2.4.1" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>نوع البرنامج</label>
                        <select required>
                            <option value="paid">احترافي (مدفوع)</option>
                            <option value="free">أداة مساعدة (مجاني)</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>رابط ملف التحميل (مباشر)</label>
                    <input type="url" placeholder="https://..." required>
                </div>
                
                <div class="input-group">
                    <label>وصف البرنامج أو مميزات التحديث</label>
                    <textarea rows="4" placeholder="اكتب هنا التحديثات والمميزات التي سيراها المستخدم..." required></textarea>
                </div>

                <button type="submit" class="btn-full btn-success" style="font-size: 1.2rem; padding: 15px;"><i class="fas fa-upload"></i> نشر البرنامج</button>
            </form>
        </div>
    </div>
</body>
</html>
