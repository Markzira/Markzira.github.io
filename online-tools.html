<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markzira | Online Tools</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav id="global-nav"></nav>

    <div class="container page-layout">
        <main class="main-content" style="flex: 1 1 100%; text-align: center;">
            <h1 style="font-size: 3rem; color: #fff; margin-bottom: 20px;">Online <span style="color: #3b82f6;">Tools</span></h1>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 40px;">Use our fast, secure, and free online utilities directly from your browser.</p>

            <div class="grid" style="text-align: left;">
                <!-- Example Online Tool Card -->
                <div class="card" style="border-top: 3px solid #3b82f6;">
                    <i class="fab fa-whatsapp" style="font-size: 3.5rem; color: #25d366; margin-bottom: 15px;"></i>
                    <h3 style="color: #fff; margin-bottom: 10px; font-size: 1.5rem;">WhatsApp Link Generator</h3>
                    <p style="color: #cbd5e1; margin: 20px 0; font-size: 0.95rem;">Create direct chat links for your WhatsApp numbers to use in ads and social media.</p>
                    <a href="#" class="btn-primary" style="background: linear-gradient(90deg, #3b82f6, #2563eb);">
                        <i class="fas fa-external-link-alt"></i> Open Tool
                    </a>
                </div>
            </div>
        </main>
    </div>

    <footer id="global-footer" style="background-color: #020617; border-top: 1px solid #1e293b;"></footer>
    <script src="shared-layout.js"></script>
