<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Markzira</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
            </ul>
            <a href="index.html" class="logo-center">
                <i class="fas fa-meteor logo-icon"></i>
                <span class="logo-text">Mark</span><span class="logo-sub">zira</span>
            </a>
            <div class="nav-actions">
                <a href="register.html" class="register-btn-nav">إنشاء حساب</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color: #fff; margin-bottom: 10px;">تسجيل الدخول</h2>
            <p style="color: #94a3b8; margin-bottom: 25px;">مرحباً بعودتك إلى منصة ماركزيرا</p>
            
            <form onsubmit="event.preventDefault(); window.location.href='downloads.html';">
                <div class="input-group">
                    <label>البريد الإلكتروني أو رقم الهاتف</label>
                    <input type="text" placeholder="أدخل بياناتك" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="btn-full">دخول إلى حسابي</button>
            </form>
            <p style="color: #cbd5e1; margin-top: 20px; text-align: center;">ليس لديك حساب؟ <a href="register.html" style="color: #f59e0b;">اشترك الآن وافتح الصلاحيات</a></p>
        </div>
    </div>
</body>
</html>
