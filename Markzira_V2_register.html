<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | Markzira</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="downloads.html">مركز التحميل</a></li>
            </ul>
            <a href="index.html" class="logo-center">
                <i class="fas fa-meteor logo-icon"></i>
                <span class="logo-text">Mark</span><span class="logo-sub">zira</span>
            </a>
            <div class="nav-actions">
                <a href="login.html" class="login-btn-nav">تسجيل الدخول</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color: #f59e0b; margin-bottom: 10px;">افتح صلاحيات الاستخدام</h2>
            <p style="color: #94a3b8; margin-bottom: 30px;">قم بتسجيل بياناتك الصحيحة لإنشاء حسابك وتفعيل التحميل للبرامج.</p>
            
            <form onsubmit="event.preventDefault(); alert('تم جمع البيانات وتفعيل حسابك بنجاح! سيتم توجيهك لمركز التحميل.'); window.location.href='downloads.html';">
                <div class="input-group">
                    <label>الاسم بالكامل</label>
                    <input type="text" placeholder="أدخل اسمك" required>
                </div>
                <div class="input-group">
                    <label>اسم الشركة / النشاط (اختياري)</label>
                    <input type="text" placeholder="مثال: Element Real Estate">
                </div>
                <div class="input-group">
                    <label>رقم الواتساب</label>
                    <input type="tel" placeholder="رقم الهاتف متضمن كود الدولة" required>
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="أدخل كلمة مرور قوية" required>
                </div>
                
                <button type="submit" class="btn-full" style="margin-top: 10px;">تسجيل وتفعيل الحساب</button>
            </form>
            <p style="color: #cbd5e1; margin-top: 20px; text-align: center;">لديك حساب بالفعل؟ <a href="login.html" style="color: #f59e0b;">سجل دخولك هنا</a></p>
        </div>
    </div>
</body>
</html>
